name: Android Release APK Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  android-release:
    runs-on: ubuntu-latest

    env:
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:

      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.3.1

      - name: Restore Release Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > KaziTV.jks
          ls -la KaziTV.jks

      - name: Create key.properties
        run: |
          cat <<EOF > key.properties
          storeFile=KaziTV.jks
          storePassword=${KEYSTORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF

      - name: Show Project Structure
        run: |
          pwd
          ls -la
          find . -maxdepth 3 -type f -name "build.gradle*"
          find . -maxdepth 3 -type f -name "settings.gradle*"

      - name: Make Gradlew Executable
        run: chmod +x gradlew

      - name: Clean Project
        run: ./gradlew clean

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: KaziTV-Release
          path: |
            **/build/outputs/apk/release/*.apk
          if-no-files-found: error
